services:
  - type: static
    name: macokasa-kabaza-system
    runtime: static
    buildCommand: node scripts/write-config.mjs
    staticPublishPath: public
    pullRequestPreviewsEnabled: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
